<!DOCTYPE html>
<html lang="hu">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kép középen</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;

<body>
